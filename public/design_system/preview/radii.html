<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  body { font-family: var(--font-sans); color: var(--fg-1); -webkit-font-smoothing:antialiased; }
  .card { padding: 20px 24px; }
  .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:4px; align-items:center; }
  .hex { font: 500 10px/1 var(--font-mono); color: var(--fg-3); letter-spacing: 0.02em; text-align:center; }
  .tiny { font: 400 11px/1.3 var(--font-sans); color: var(--fg-3); letter-spacing: 0.3px; }
</style></head>
<body><div class="card">
<div style="display:flex;flex-direction:column;gap:10px">
  <div class="tiny">Border radius — 2 / 4 / 6 / 8 / 10 / 12 / 16 / 20 / 999</div>
  <div class="row">
    <div class="col">
      <div style="width:54px;height:54px;background:#EAEFF5;border:1px solid #CBD5E1;border-radius:2px"></div>
      <div class="hex">2</div>
    </div>
    <div class="col">
      <div style="width:54px;height:54px;background:#EAEFF5;border:1px solid #CBD5E1;border-radius:4px"></div>
      <div class="hex">4</div>
    </div>
    <div class="col">
      <div style="width:54px;height:54px;background:#EAEFF5;border:1px solid #CBD5E1;border-radius:6px"></div>
      <div class="hex">6 · button · chip · input</div>
    </div>
    <div class="col">
      <div style="width:54px;height:54px;background:#EAEFF5;border:1px solid #CBD5E1;border-radius:8px"></div>
      <div class="hex">8 · small card</div>
    </div>
    <div class="col">
      <div style="width:54px;height:54px;background:#EAEFF5;border:1px solid #CBD5E1;border-radius:10px"></div>
      <div class="hex">10</div>
    </div>
    <div class="col">
      <div style="width:54px;height:54px;background:#EAEFF5;border:1px solid #CBD5E1;border-radius:12px"></div>
      <div class="hex">12 · card</div>
    </div>
    <div class="col">
      <div style="width:54px;height:54px;background:#EAEFF5;border:1px solid #CBD5E1;border-radius:16px"></div>
      <div class="hex">16 · large card · modal</div>
    </div>
    <div class="col">
      <div style="width:54px;height:54px;background:#EAEFF5;border:1px solid #CBD5E1;border-radius:20px"></div>
      <div class="hex">20</div>
    </div>
    <div class="col">
      <div style="width:54px;height:54px;background:#EAEFF5;border:1px solid #CBD5E1;border-radius:999px"></div>
      <div class="hex">999 · badge · pill</div>
    </div>
  </div>
</div></div></body></html>
