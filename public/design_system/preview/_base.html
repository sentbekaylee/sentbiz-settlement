<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; font-family: var(--font-sans); color: var(--fg-1); }
  .card { padding: 20px 24px; }
  .row { display:flex; align-items:center; gap:12px; }
  .col { display:flex; flex-direction:column; }
  .swatch { width:64px; height:64px; border-radius:8px; display:flex; align-items:flex-end; padding:6px; color:#fff; font: 600 10px/1 var(--font-sans); box-shadow: inset 0 0 0 1px rgba(15,23,42,0.06); }
  .swatch.-lt { color: var(--fg-1); }
  .hex { font: 500 11px/1 var(--font-mono); color: var(--fg-3); letter-spacing: 0.02em; }
  .lbl { font: 600 12px/1 var(--font-sans); color: var(--fg-2); }
  .tiny { font: 400 11px/1.3 var(--font-sans); color: var(--fg-3); letter-spacing: 0.3px; }
</style>
</head>
<body class="sb-root">
<!-- card body is injected per file -->
</body>
</html>
