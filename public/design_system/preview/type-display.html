<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  body { font-family: var(--font-sans); color: var(--fg-1); -webkit-font-smoothing:antialiased; }
  .card { padding: 20px 24px; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .hex { font: 500 11px/1 var(--font-mono); color: var(--fg-3); letter-spacing: 0.02em; margin-top:2px; }
  .tiny { font: 400 11px/1.3 var(--font-sans); color: var(--fg-3); letter-spacing: 0.3px; }
</style></head>
<body><div class="card">
<div class="col">
  <div class="tiny">Display — marketing moments · Pretendard 800</div>
  <div style="font-family:var(--font-sans);font-weight:800;font-size:40px;line-height:48px;color:var(--fg-1)">Cross-border, on time.</div>
  <div class="hex">Display 1 · 40 / 48 · 800</div>
  <div style="font-family:var(--font-sans);font-weight:800;font-size:32px;line-height:40px;color:var(--fg-1)">국경 없는 송금</div>
  <div class="hex">Display 2 · 32 / 40 · 800</div>
</div></div></body></html>
