<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  body { font-family: var(--font-sans); color: var(--fg-1); -webkit-font-smoothing:antialiased; }
  .card { padding: 20px 24px; }
  .col { display:flex; flex-direction:column; gap:4px; align-items:center; }
  .hex { font: 500 10px/1 var(--font-mono); color: var(--fg-3); letter-spacing: 0.02em; text-align:center; }
  .tiny { font: 400 11px/1.3 var(--font-sans); color: var(--fg-3); letter-spacing: 0.3px; margin-bottom:8px; }
</style></head>
<body><div class="card">
<div class="tiny">Spacing scale — 4px grid · 2 / 4 / 6 / 8 / 12 / 16 / 20 / 24 / 28 / 32 / 40 / 48</div>
<div style="display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap">

  <div class="col"><div style="width:2px; height:2px; background:var(--accent-brand);border-radius:2px"></div><div class="hex">2</div></div>
  <div class="col"><div style="width:4px; height:4px; background:var(--accent-brand);border-radius:2px"></div><div class="hex">4</div></div>
  <div class="col"><div style="width:6px; height:6px; background:var(--accent-brand);border-radius:2px"></div><div class="hex">6</div></div>
  <div class="col"><div style="width:8px; height:8px; background:var(--accent-brand);border-radius:2px"></div><div class="hex">8</div></div>
  <div class="col"><div style="width:12px;height:12px;background:var(--accent-brand);border-radius:2px"></div><div class="hex">12</div></div>
  <div class="col"><div style="width:16px;height:16px;background:var(--accent-brand);border-radius:2px"></div><div class="hex">16</div></div>
  <div class="col"><div style="width:20px;height:20px;background:var(--accent-brand);border-radius:2px"></div><div class="hex">20</div></div>
  <div class="col"><div style="width:24px;height:24px;background:var(--accent-brand);border-radius:2px"></div><div class="hex">24</div></div>
  <div class="col"><div style="width:28px;height:28px;background:var(--accent-brand);border-radius:2px"></div><div class="hex">28</div></div>
  <div class="col"><div style="width:32px;height:32px;background:var(--accent-brand);border-radius:2px"></div><div class="hex">32</div></div>
  <div class="col"><div style="width:40px;height:40px;background:var(--accent-brand);border-radius:2px"></div><div class="hex">40</div></div>
  <div class="col"><div style="width:48px;height:48px;background:var(--accent-brand);border-radius:2px"></div><div class="hex">48</div></div>

</div>
</div></body></html>
