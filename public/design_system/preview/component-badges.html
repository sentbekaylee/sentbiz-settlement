<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  body { font-family: var(--font-sans); color: var(--fg-1); -webkit-font-smoothing:antialiased; }
  .card { padding: 20px 24px; }
  .row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:12px; }
  .tiny { font: 400 11px/1.3 var(--font-sans); color: var(--fg-3); letter-spacing: 0.3px; }
</style></head>
<body><div class="card">
<div class="col">
  <div class="tiny">Badges — h-22 · r-999 · 12px/600 · no border</div>
  <div class="row">
    <span style="display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:999px;color:#00C592;background:#DFFBED;font:600 12px/18px var(--font-sans);letter-spacing:0.06px;white-space:nowrap">Positive</span>
    <span style="display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:999px;color:#F91C1C;background:#FFEFEF;font:600 12px/18px var(--font-sans);letter-spacing:0.06px;white-space:nowrap">Negative</span>
    <span style="display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:999px;color:#FF6200;background:#FFEFD3;font:600 12px/18px var(--font-sans);letter-spacing:0.06px;white-space:nowrap">Waiting</span>
    <span style="display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:999px;color:#1890FF;background:#E6F7FF;font:600 12px/18px var(--font-sans);letter-spacing:0.06px;white-space:nowrap">Progress</span>
    <span style="display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:999px;color:#3176FD;background:#F2F6FF;font:600 12px/18px var(--font-sans);letter-spacing:0.06px;white-space:nowrap">Informative</span>
    <span style="display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:999px;color:#293548;background:#F1F5F9;font:600 12px/18px var(--font-sans);letter-spacing:0.06px;white-space:nowrap">Neutral</span>
  </div>
</div></div></body></html>
