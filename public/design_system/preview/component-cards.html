<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  body { font-family: var(--font-sans); color: var(--fg-1); -webkit-font-smoothing:antialiased; }
  .card { padding: 20px 24px; }
  .row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .tiny { font: 400 11px/1.3 var(--font-sans); color: var(--fg-3); letter-spacing: 0.3px; }
</style></head>
<body><div class="card">
<div class="col" style="background:#F8FAFC;margin:-20px -24px;padding:20px 24px">
  <div class="tiny">Card — 1px border · 12px radius · white surface. Shadow is opt-in.</div>
  <div class="row">
    <div style="background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:16px;min-width:200px">
      <div style="font:600 14px/20px var(--font-sans);color:#64748B">Today's volume</div>
      <div style="font:700 22px/34px var(--font-sans);color:#0F172A;margin-top:4px">$1,284,512</div>
      <div style="font:400 12px/18px var(--font-sans);color:#00C592">▲ 4.2% vs yesterday</div>
    </div>
    <div style="background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:16px;min-width:200px;box-shadow:0 2px 8px 0 rgba(15,23,42,0.08)">
      <div style="font:600 14px/20px var(--font-sans);color:#64748B">Pending review</div>
      <div style="font:700 22px/34px var(--font-sans);color:#0F172A;margin-top:4px">12</div>
      <div style="font:400 12px/18px var(--font-sans);color:#64748B">Shadow100 (elevated)</div>
    </div>
  </div>
</div></div></body></html>
