<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>SentBiz DS V.2 — Components</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html, body { margin:0; padding:0; background:#F1F5F9; font-family:'Pretendard', system-ui, sans-serif; }
  *, *::before, *::after { box-sizing:border-box; }
  button { font-family:inherit; }
  @keyframes sbFade { from{opacity:0}to{opacity:1} }
  @keyframes sbPop  { from{transform:translate(-50%,-50%) scale(0.96);opacity:0} to{transform:translate(-50%,-50%) scale(1);opacity:1} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- ── Primitives (inlined from Primitives.jsx) ───────────────────────── -->
<script type="text/babel">
const T = {
  primary:'#0746CA', primaryStrong:'#0C3698', primaryHeavy:'#122666',
  fg1:'#0F172A', fg2:'#293548', fg3:'#64748B', fg4:'#94A3B8', fgDisable:'#CBD5E1',
  bg:'#FFFFFF', surfaceNormal:'#F8FAFC', surfaceStrong:'#EAEFF5', surfaceHeavy:'#E2E8F0',
  positive:'#00C592', positiveLight:'#DFFBED',
  warning:'#FF6200',  warningLight:'#FFEFD3',
  negative:'#F91C1C', negativeLight:'#FFEFEF',
  progress:'#1890FF', progressLight:'#E6F7FF',
  informative:'#3176FD', informativeLight:'#F2F6FF',
  neutralFg:'#293548', neutralBg:'#F1F5F9', neutralBr:'#CBD5E1',
  borderSubtle:'#E2E8F0', borderDefault:'#CBD5E1',
};

const Button = ({ type='solid', usage='primary', size='md', children, onClick, disabled, style, ...rest }) => {
  const base = {
    all:'unset', boxSizing:'border-box', display:'inline-flex',
    alignItems:'center', justifyContent:'center', gap:6,
    borderRadius:6, cursor:disabled?'not-allowed':'pointer',
    transition:'background 150ms cubic-bezier(0.2,0,0,1)',
    fontFamily:'Pretendard, -apple-system, sans-serif', fontWeight:600, whiteSpace:'nowrap',
  };
  const sizes = {
    lg:{ minHeight:48, padding:'16px',      fontSize:14, lineHeight:'16px', letterSpacing:'0.175px' },
    md:{ minHeight:40, padding:'12px 16px', fontSize:14, lineHeight:'16px', letterSpacing:'0.175px' },
    sm:{ minHeight:36, padding:'8px 14px',  fontSize:12, lineHeight:'14px', letterSpacing:'0.15px' },
    xs:{ minHeight:28, padding:'6px 12px',  fontSize:11, lineHeight:'14px', letterSpacing:'0.138px' },
  };
  const D = '#122666';
  const matrix = {
    'solid-primary':   disabled?{background:'#64748B',color:'#94A3B8'}:{background:D,color:'#FFFFFF'},
    'solid-secondary': disabled?{background:T.surfaceHeavy,color:'#94A3B8'}:{background:T.surfaceStrong,color:D},
    'line-tertiary':   disabled?{background:T.bg,color:'#94A3B8',boxShadow:`inset 0 0 0 1px ${T.surfaceStrong}`}:{background:T.bg,color:D,boxShadow:`inset 0 0 0 1px ${T.surfaceStrong}`},
    'text-primary':    disabled?{background:'transparent',color:'#94A3B8',padding:'12px'}:{background:'transparent',color:D,padding:'12px'},
  };
  const vs = matrix[`${type}-${usage}`] || matrix['solid-primary'];
  return <button {...rest} disabled={disabled} onClick={onClick} style={{...base,...sizes[size],...vs,...style}}>{children}</button>;
};

const Badge = ({ variant='neutral', children }) => {
  const map = {
    positive:{c:T.positive,bg:T.positiveLight}, negative:{c:T.negative,bg:T.negativeLight},
    waiting:{c:T.warning,bg:T.warningLight},    informative:{c:T.informative,bg:T.informativeLight},
    neutral:{c:T.neutralFg,bg:T.neutralBg},     progress:{c:T.progress,bg:T.progressLight},
  };
  const s = map[variant];
  return <span style={{
    display:'inline-flex', alignItems:'center', height:22, padding:'0 10px',
    borderRadius:999, color:s.c, background:s.bg,
    fontFamily:'Pretendard, -apple-system, sans-serif', fontSize:12, fontWeight:600,
    lineHeight:'18px', letterSpacing:'0.06px', whiteSpace:'nowrap',
  }}>{children}</span>;
};

const Icon = ({ name, size=20, color=T.fg2 }) => (
  <span style={{
    display:'inline-block', width:size, height:size,
    WebkitMask:`url(../../assets/icons/${name}.svg) center/contain no-repeat`,
    mask:`url(../../assets/icons/${name}.svg) center/contain no-repeat`,
    background:color, flexShrink:0,
  }}/>
);

const IconBtn = ({ name, onClick, active, ariaLabel }) => (
  <button aria-label={ariaLabel} onClick={onClick} style={{
    all:'unset', boxSizing:'border-box', display:'inline-flex', alignItems:'center',
    justifyContent:'center', width:36, height:36, borderRadius:8,
    background:active?T.surfaceStrong:'transparent', cursor:'pointer',
    transition:'background 120ms cubic-bezier(0.2,0,0,1)',
  }}
  onMouseEnter={e=>{ if(!active) e.currentTarget.style.background=T.surfaceNormal; }}
  onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='transparent'; }}>
    <Icon name={name} size={20} color={T.fg2}/>
  </button>
);

const Avatar = ({ name='SB', size=32, bg=T.primary }) => (
  <div style={{
    width:size, height:size, borderRadius:999, background:bg,
    display:'inline-flex', alignItems:'center', justifyContent:'center',
    color:'#fff', fontFamily:'Pretendard, -apple-system, sans-serif', fontWeight:700,
    fontSize:Math.round(size*0.38), letterSpacing:'0.02em', flexShrink:0,
  }}>{name}</div>
);

const Input = ({ placeholder, value, onChange, iconLeft, iconRight, onClear, unit, label, helperText, width='100%', isError, disabled }) => {
  const [focus, setFocus] = React.useState(false);
  const border = disabled?T.borderDefault:isError?T.negative:focus?'#122666':T.borderSubtle;
  const bg = disabled?T.surfaceStrong:T.bg;
  const helperColor = disabled?T.fgDisable:isError?T.negative:T.fg3;
  const showClear = onClear && value && !disabled;
  const iconColor = disabled?T.fgDisable:T.fg4;
  return (
    <div style={{display:'inline-flex',flexDirection:'column',width,gap:6}}>
      {label && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:T.fg3,letterSpacing:'0.07px'}}>{label}</span>}
      <div style={{display:'flex',alignItems:'center',height:40,padding:'0 16px',border:`1px solid ${border}`,background:bg,borderRadius:6,transition:'border 120ms cubic-bezier(0.2,0,0,1)'}}>
        {iconLeft && <span style={{marginRight:8,display:'inline-flex',flexShrink:0}}><Icon name={iconLeft} size={16} color={iconColor}/></span>}
        <input value={value} onChange={onChange} placeholder={placeholder}
          onFocus={()=>{ if(!disabled) setFocus(true); }} onBlur={()=>setFocus(false)}
          disabled={disabled}
          style={{flex:1,border:0,outline:0,background:'transparent',fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:disabled?T.fgDisable:T.fg1,letterSpacing:'0.07px',minWidth:0,cursor:disabled?'not-allowed':'text'}}/>
        {unit && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,color:disabled?T.fgDisable:T.fg3,marginLeft:8,whiteSpace:'nowrap',flexShrink:0}}>{unit}</span>}
        {showClear && <button onClick={onClear} style={{all:'unset',display:'inline-flex',cursor:'pointer',marginLeft:4,flexShrink:0}}><Icon name="XCircle" size={16} color={T.fg4}/></button>}
        {iconRight && !showClear && <span style={{marginLeft:8,display:'inline-flex',flexShrink:0}}><Icon name={iconRight} size={16} color={iconColor}/></span>}
      </div>
      {helperText && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:11,lineHeight:'16px',letterSpacing:'0.055px',color:helperColor}}>{helperText}</span>}
    </div>
  );
};

const SelectOption = ({ label, isSelected, onSelect }) => {
  const [hovered, setHovered] = React.useState(false);
  return (
    <button onClick={onSelect} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{all:'unset',boxSizing:'border-box',display:'flex',alignItems:'center',gap:8,height:40,paddingLeft:16,paddingRight:8,background:hovered?T.informativeLight:T.bg,borderRadius:4,cursor:'pointer',width:'100%',transition:'background 100ms cubic-bezier(0.2,0,0,1)'}}>
      <span style={{flex:1,fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:T.fg1,letterSpacing:'0.07px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}}>{label}</span>
      {isSelected && <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:20,height:20,flexShrink:0}}><Icon name="Check" size={16} color={T.fg2}/></span>}
    </button>
  );
};

const Select = ({ value, onChange, options=[], placeholder='선택하세요', label, helperText, isError, disabled, searchable=true, width='100%' }) => {
  const [open, setOpen] = React.useState(false);
  const [search, setSearch] = React.useState('');
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setSearch(''); } };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);
  const selected = options.find(o => o.value === value);
  const filtered = searchable && search ? options.filter(o => o.label.toLowerCase().includes(search.toLowerCase())) : options;
  const fieldBorder = disabled?T.borderDefault:isError?T.negative:open?'#122666':T.borderSubtle;
  const fieldBg = disabled?T.surfaceStrong:T.bg;
  const fieldTextColor = (!selected||disabled)?T.fgDisable:T.fg1;
  const helperColor = disabled?T.fgDisable:isError?T.negative:T.fg3;
  const handleSelect = (val) => { onChange && onChange(val); setOpen(false); setSearch(''); };
  return (
    <div ref={ref} style={{display:'inline-flex',flexDirection:'column',width,gap:4,position:'relative'}}>
      {label && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:T.fg3,letterSpacing:'0.07px'}}>{label}</span>}
      <button disabled={disabled} onClick={()=>{ if(!disabled){setOpen(o=>!o);setSearch('');} }}
        style={{all:'unset',boxSizing:'border-box',display:'flex',alignItems:'center',height:40,paddingLeft:16,paddingRight:8,border:`1px solid ${fieldBorder}`,background:fieldBg,borderRadius:6,cursor:disabled?'not-allowed':'pointer',transition:'border 120ms cubic-bezier(0.2,0,0,1)'}}>
        <span style={{flex:1,fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:fieldTextColor,letterSpacing:'0.07px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}}>
          {selected ? selected.label : placeholder}
        </span>
        <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:20,height:20,flexShrink:0}}>
          <Icon name={open?'CaretUp':'CaretDown'} size={16} color={disabled?T.fgDisable:T.fg2}/>
        </span>
      </button>
      {open && (
        <div style={{position:'absolute',top:44,left:0,right:0,zIndex:100,background:T.bg,border:`1px solid ${T.borderSubtle}`,borderRadius:6,boxShadow:'0 2px 8px 0 rgba(15,23,42,0.08)',padding:8,display:'flex',flexDirection:'column',gap:8}}>
          {searchable && (
            <div style={{display:'flex',alignItems:'center',gap:8,height:40,padding:8,background:T.surfaceNormal,borderRadius:4,flexShrink:0}}>
              <Icon name="MagnifyingGlass" size={16} color={T.fg4}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색어를 입력하세요." autoFocus
                style={{flex:1,border:0,outline:0,background:'transparent',fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:12,lineHeight:'18px',color:T.fg1,letterSpacing:'0.06px',minWidth:0}}/>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column'}}>
            {filtered.map(o => <SelectOption key={o.value} label={o.label} isSelected={o.value===value} onSelect={()=>handleSelect(o.value)}/>)}
            {filtered.length===0 && <div style={{height:40,display:'flex',alignItems:'center',paddingLeft:16,fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,color:T.fg4}}>결과 없음</div>}
          </div>
        </div>
      )}
      {helperText && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:11,lineHeight:'16px',letterSpacing:'0.055px',color:helperColor}}>{helperText}</span>}
    </div>
  );
};

// ── Components Showcase App ────────────────────────────────────────────────
const OPTS = [
  {value:'kr',label:'대한민국'},{value:'us',label:'미국'},{value:'jp',label:'일본'},
  {value:'de',label:'독일'},{value:'gb',label:'영국'},{value:'fr',label:'프랑스'},
];

const ALL_ICONS = [
  'SquaresFour','ArrowsLeftRight','ClipboardText','Coins','MagnifyingGlass',
  'Bell','CaretDown','CaretUp','Check','X','XCircle','ArrowRight','ArrowLeft',
  'Plus','DownloadSimple','UploadSimple','SidebarSimple','Gear','Question',
  'File','DotsThreeVertical','Calendar','List','ClockCounterClockwise',
];

const Section = ({ title, children }) => (
  <div style={{marginBottom:48}}>
    <div style={{fontFamily:'Pretendard',fontSize:11,fontWeight:700,color:'#94A3B8',letterSpacing:'0.8px',textTransform:'uppercase',marginBottom:20,paddingBottom:10,borderBottom:'1px solid #E2E8F0'}}>
      {title}
    </div>
    {children}
  </div>
);

const Row = ({ label, children, align='center' }) => (
  <div style={{display:'flex',alignItems:align,gap:12,marginBottom:16}}>
    <div style={{width:200,fontFamily:'ui-monospace,monospace',fontSize:11,color:'#94A3B8',flexShrink:0,paddingTop:align==='flex-start'?3:0}}>{label}</div>
    <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>{children}</div>
  </div>
);

function App() {
  const [sel1, setSel1] = React.useState('');
  const [sel2, setSel2] = React.useState('kr');
  const [inp1, setInp1] = React.useState('');
  const [inp2, setInp2] = React.useState('Filled value');

  return (
    <div style={{maxWidth:960, margin:'0 auto', padding:'40px 32px 80px'}}>

      <div style={{marginBottom:48}}>
        <div style={{fontFamily:'Pretendard',fontSize:28,fontWeight:800,color:'#0F172A',letterSpacing:'-0.02em'}}>SentBiz Design System V.2</div>
        <div style={{fontFamily:'Pretendard',fontSize:14,color:'#64748B',marginTop:6}}>Components — 변경/신규 추가 항목 확인용</div>
      </div>

      <Section title="Button — type × usage">
        <Row label="solid / primary">
          <Button type="solid" usage="primary" size="lg">Large</Button>
          <Button type="solid" usage="primary" size="md">Medium</Button>
          <Button type="solid" usage="primary" size="sm">Small</Button>
          <Button type="solid" usage="primary" size="xs">XSmall</Button>
          <Button type="solid" usage="primary" disabled>Disabled</Button>
        </Row>
        <Row label="solid / secondary">
          <Button type="solid" usage="secondary" size="lg">Large</Button>
          <Button type="solid" usage="secondary" size="md">Medium</Button>
          <Button type="solid" usage="secondary" size="sm">Small</Button>
          <Button type="solid" usage="secondary" size="xs">XSmall</Button>
          <Button type="solid" usage="secondary" disabled>Disabled</Button>
        </Row>
        <Row label="line / tertiary">
          <Button type="line" usage="tertiary" size="lg">Large</Button>
          <Button type="line" usage="tertiary" size="md">Medium</Button>
          <Button type="line" usage="tertiary" size="sm">Small</Button>
          <Button type="line" usage="tertiary" size="xs">XSmall</Button>
          <Button type="line" usage="tertiary" disabled>Disabled</Button>
        </Row>
        <Row label="text / primary">
          <Button type="text" usage="primary" size="md">Medium</Button>
          <Button type="text" usage="primary" size="sm">Small</Button>
          <Button type="text" usage="primary" disabled>Disabled</Button>
        </Row>
        <Row label="with icon">
          <Button type="solid" usage="primary"><Icon name="Plus" size={14} color="#fff"/>New transfer</Button>
          <Button type="solid" usage="secondary"><Icon name="DownloadSimple" size={14} color="#293548"/>Export</Button>
          <Button type="text" usage="primary" size="sm">View all <Icon name="ArrowRight" size={14} color="#293548"/></Button>
        </Row>
      </Section>

      <Section title="Badge — variant">
        <Row label="status variants">
          <Badge variant="positive">Settled</Badge>
          <Badge variant="waiting">Pending</Badge>
          <Badge variant="negative">Action needed</Badge>
          <Badge variant="progress">Processing</Badge>
          <Badge variant="informative">Informative</Badge>
          <Badge variant="neutral">Neutral</Badge>
        </Row>
      </Section>

      <Section title="Input — states">
        <Row label="enabled" align="flex-start">
          <Input placeholder="값을 입력하세요" value={inp1} onChange={e=>setInp1(e.target.value)} width={280}/>
        </Row>
        <Row label="filled + clear (×)" align="flex-start">
          <Input placeholder="값을 입력하세요" value={inp2} onChange={e=>setInp2(e.target.value)} onClear={()=>setInp2('')} width={280}/>
        </Row>
        <Row label="label + helperText" align="flex-start">
          <Input placeholder="0.00" value="" onChange={()=>{}} label="송금 금액" helperText="최소 ₩10,000 이상 입력하세요" width={280}/>
        </Row>
        <Row label="iconLeft + unit" align="flex-start">
          <Input placeholder="검색어 입력" value="" onChange={()=>{}} iconLeft="MagnifyingGlass" width={280}/>
          <Input placeholder="0.00" value="" onChange={()=>{}} unit="KRW" width={200}/>
        </Row>
        <Row label="error" align="flex-start">
          <Input placeholder="값을 입력하세요" value="" onChange={()=>{}} isError helperText="필수 입력 항목입니다" width={280}/>
        </Row>
        <Row label="disabled" align="flex-start">
          <Input placeholder="비활성 상태" value="" onChange={()=>{}} disabled helperText="수정 불가" width={280}/>
        </Row>
      </Section>

      <Section title="Select — states">
        <Row label="enabled (searchable)" align="flex-start">
          <Select value={sel1} onChange={setSel1} options={OPTS} placeholder="국가 선택" width={280}/>
        </Row>
        <Row label="filled + label + helper" align="flex-start">
          <Select value={sel2} onChange={setSel2} options={OPTS} label="수취국가" helperText="송금 가능한 국가를 선택하세요" width={280}/>
        </Row>
        <Row label="no search" align="flex-start">
          <Select value="" onChange={()=>{}} options={OPTS} placeholder="국가 선택" searchable={false} width={280}/>
        </Row>
        <Row label="error" align="flex-start">
          <Select value="" onChange={()=>{}} options={OPTS} placeholder="국가 선택" isError helperText="필수 항목입니다" width={280}/>
        </Row>
        <Row label="disabled" align="flex-start">
          <Select value="" onChange={()=>{}} options={OPTS} placeholder="국가 선택" disabled width={280}/>
        </Row>
      </Section>

      <Section title="Avatar + IconBtn">
        <Row label="Avatar">
          {[['GS','#915FFF'],['KI','#0746CA'],['AF','#28E1E5'],['NP','#FF9A32'],['SB','#122666']].map(([n,c])=>(
            <Avatar key={n} name={n} size={36} bg={c}/>
          ))}
        </Row>
        <Row label="IconBtn">
          <IconBtn name="Bell" ariaLabel="bell"/>
          <IconBtn name="MagnifyingGlass" ariaLabel="search"/>
          <IconBtn name="DotsThreeVertical" ariaLabel="more"/>
          <IconBtn name="ArrowLeft" ariaLabel="prev"/>
          <IconBtn name="ArrowRight" ariaLabel="next"/>
          <IconBtn name="Gear" active ariaLabel="settings (active)"/>
        </Row>
      </Section>

      <Section title={`Icon — Phosphor PascalCase (${ALL_ICONS.length}개 로컬 SVG)`}>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {ALL_ICONS.map(n=>(
            <div key={n} title={n} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'12px 8px',background:'#fff',borderRadius:8,border:'1px solid #E2E8F0',width:84}}>
              <Icon name={n} size={20} color="#293548"/>
              <span style={{fontFamily:'ui-monospace,monospace',fontSize:9,color:'#94A3B8',textAlign:'center',lineHeight:'12px',wordBreak:'break-all'}}>{n}</span>
            </div>
          ))}
        </div>
      </Section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
