// ─── Design tokens ────────────────────────────────────────────────────────────
const T = {
  primary:'#0746CA', primaryStrong:'#0C3698', primaryHeavy:'#122666',
  fg1:'#0F172A', fg2:'#293548', fg3:'#64748B', fg4:'#94A3B8', fgDisable:'#CBD5E1',
  bg:'#FFFFFF', surfaceNormal:'#F8FAFC', surfaceStrong:'#EAEFF5', surfaceHeavy:'#E2E8F0',
  positive:'#00C592', positiveLight:'#DFFBED',
  warning:'#FF6200',  warningLight:'#FFEFD3',
  negative:'#F91C1C', negativeLight:'#FFEFEF',
  progress:'#1890FF', progressLight:'#E6F7FF',
  informative:'#3176FD', informativeLight:'#F2F6FF',
  neutralFg:'#293548', neutralBg:'#F1F5F9',
  borderSubtle:'rgba(112,115,124,0.22)', borderDefault:'#CBD5E1',
};

// ─── Primitives ───────────────────────────────────────────────────────────────
const Icon = ({ name, size=20, color=T.fg2 }) => (
  <span style={{
    display:'inline-block', width:size, height:size, flexShrink:0,
    WebkitMask:`url(./design_system/assets/icons/${name}.svg) center/contain no-repeat`,
    mask:`url(./design_system/assets/icons/${name}.svg) center/contain no-repeat`,
    background:color,
  }}/>
);

const IconBtn = ({ name, onClick, ariaLabel }) => {
  const [hov, setHov] = useState(false);
  return (
    <button aria-label={ariaLabel} onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{all:'unset',boxSizing:'border-box',display:'inline-flex',alignItems:'center',justifyContent:'center',width:36,height:36,borderRadius:8,background:hov?T.surfaceNormal:'transparent',cursor:'pointer',transition:'background 120ms'}}>
      <Icon name={name} size={20} color={T.fg2}/>
    </button>
  );
};

const Badge = ({ variant='neutral', children }) => {
  const map = {
    positive:   {c:T.positive,    bg:T.positiveLight},
    negative:   {c:T.negative,    bg:T.negativeLight},
    waiting:    {c:T.warning,     bg:T.warningLight},
    informative:{c:T.informative, bg:T.informativeLight},
    neutral:    {c:T.neutralFg,   bg:T.neutralBg},
    progress:   {c:T.progress,    bg:T.progressLight},
    payment:    {c:'#0746CA',     bg:'#F2F6FF'},
    refund:     {c:T.negative,    bg:T.negativeLight},
  };
  const s = map[variant] || map.neutral;
  return <span style={{display:'inline-flex',alignItems:'center',height:22,padding:'0 10px',borderRadius:999,color:s.c,background:s.bg,fontSize:12,fontWeight:600,lineHeight:'18px',whiteSpace:'nowrap'}}>{children}</span>;
};

const Button = ({ type='solid', usage='primary', size='md', children, onClick, style }) => {
  const sizes = {
    lg:{minHeight:48,padding:'0 16px',fontSize:14},
    md:{minHeight:40,padding:'0 16px',fontSize:14},
    sm:{minHeight:36,padding:'0 14px',fontSize:12},
    xs:{minHeight:28,padding:'0 12px',fontSize:11},
  };
  const matrix = {
    'solid-primary':  {background:T.primaryHeavy, color:'#fff'},
    'solid-secondary':{background:T.surfaceStrong,color:T.primaryHeavy},
    'line-tertiary':  {background:T.bg,color:T.primaryHeavy,boxShadow:`inset 0 0 0 1px ${T.surfaceStrong}`},
  };
  const vs = matrix[`${type}-${usage}`] || matrix['solid-primary'];
  return (
    <button onClick={onClick} style={{
      all:'unset',boxSizing:'border-box',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,
      borderRadius:6,cursor:'pointer',transition:'background 150ms',fontWeight:600,whiteSpace:'nowrap',
      ...sizes[size],...vs,...style,
    }}>{children}</button>
  );
};

const SidebarItem = ({ icon, label, isActive, folded, onClick, indent=false }) => {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        all:'unset',boxSizing:'border-box',display:'flex',alignItems:'center',gap:6,

        padding: indent && !folded ? '8px 4px 8px 16px' : '8px 4px',
        width:folded?'auto':224,
        justifyContent:folded?'center':'flex-start',
        borderRadius:4,cursor:'pointer',transition:'background 0.15s',
        background:isActive?'rgba(203,213,225,0.20)':hov?'rgba(203,213,225,0.10)':'transparent',
      }}>
      <div style={{width:24,height:24,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <Icon name={icon} size={indent?14:20} color={isActive?'#fff':'#CBD5E1'}/>
      </div>
      {!folded && (
        <span style={{fontSize:indent?13:14,fontWeight:isActive?600:500,color:isActive?'#fff':'#CBD5E1',whiteSpace:'nowrap'}}>
          {label}
        </span>
      )}
    </button>
  );
};

const SidebarGroup = ({ group, active, onNavigate, folded }) => {
  const [open, setOpen] = useState(true);
  const isGroupActive = group.children.some(c => c.key === active);
  return (
    <div>
      <button onClick={()=>setOpen(o=>!o)}
        style={{all:'unset',boxSizing:'border-box',display:'flex',alignItems:'center',gap:6,
          height:40,padding:'8px 4px',margin:'0 8px',width:folded?'auto':224,
          justifyContent:folded?'center':'flex-start',borderRadius:4,cursor:'pointer',
          transition:'background 0.15s',
          background: open ? 'rgba(203,213,225,0.08)' : 'transparent',
        }}>
        <div style={{width:28,height:28,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name={group.icon} size={20} color={isGroupActive?'#fff':'#CBD5E1'}/>
        </div>
        {!folded && <>
          <span style={{flex:1,fontSize:14,fontWeight:600,color:isGroupActive?'#fff':'#CBD5E1',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
            {group.label}
          </span>
          <Icon name={open?'CaretUp':'CaretDown'} size={12} color="#94A3B8" style={{marginRight:4}}/>
        </>}
      </button>
      {open && group.children.map(({key,icon,label}) => (
        <SidebarItem key={key} icon={icon} label={label} isActive={active===key}
          folded={folded} indent onClick={()=>onNavigate(key)}/>
      ))}
    </div>
  );
};

const Sidebar = ({ active, onNavigate, folded, onToggleFold }) => (
  <aside style={{width:folded?64:240,flexShrink:0,height:'100%',background:'#122666',display:'flex',flexDirection:'column',transition:'width 0.2s ease-in-out',overflow:'hidden'}}>
    <div style={{height:68,flexShrink:0,display:'flex',alignItems:'center',padding:folded?0:'0 20px',justifyContent:folded?'center':'flex-start',borderBottom:'1px solid rgba(203,213,225,0.10)'}}>
      {folded
        ? <img src="./design_system/assets/logos/logo-mark-dark-navy.svg" width="28" height="28" alt="SentBiz"/>
        : <img src="./design_system/assets/logos/wordmark-white.svg" width="92" height="20" alt="sentbiz"/>
      }
    </div>
    <nav style={{padding:'12px 0',display:'flex',flexDirection:'column',gap:2,flex:1}}>
      {NAV_GROUPS.map(group => (
        <SidebarGroup key={group.key} group={group} active={active} onNavigate={onNavigate} folded={folded}/>
      ))}
    </nav>
    <div style={{padding:'12px 0',display:'flex',flexDirection:'column',gap:2,borderTop:'1px solid rgba(203,213,225,0.10)'}}>
      {FOOTER_NAV.map(({key,icon,label}) => (
        <SidebarItem key={key} icon={icon} label={label} isActive={false} folded={folded} onClick={()=>{}}/>

        <button onClick={onToggleFold} style={{all:'unset',cursor:'pointer',width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="SidebarSimple" size={20} color="#94A3B8"/>

    </div>

const toISO = d => d.toISOString().split('T')[0];
const fmtDisp = s => s.replace(/-/g, '.');

const DateRangePicker = () => {
  const today = new Date();
  const initTo   = toISO(today);
  const initFrom = toISO(new Date(today.getFullYear(), today.getMonth() - 1, today.getDate()));

  const [open,    setOpen]    = useState(false);
  const [from,    setFrom]    = useState(initFrom);
  const [to,      setTo]      = useState(initTo);
  const [applied, setApplied] = useState({from: initFrom, to: initTo});
  const [error,   setError]   = useState('');

  const validate = (f, t) => {
    if (!f || !t) return '';
    const diff = (new Date(t) - new Date(f)) / 86400000;
    if (diff < 0)   return '시작일이 종료일보다 늦습니다';
    if (diff > 365) return '최대 1년까지 조회 가능합니다';
    return '';
  };

  const setPreset = (days) => {
    const t = new Date();
    const f = new Date(t);
    if (days > 0) f.setDate(f.getDate() - days);
    const tf = toISO(f), tt = toISO(t);
    setFrom(tf); setTo(tt); setError('');
  };

  const handleFrom = v => { setFrom(v); setError(validate(v, to)); };
  const handleTo   = v => { setTo(v);   setError(validate(from, v)); };

  const apply = () => {
    const err = validate(from, to);
    if (err) { setError(err); return; }
    setApplied({from, to});
    setOpen(false); setError('');
  };

  const cancel = () => {
    setFrom(applied.from); setTo(applied.to);
    setOpen(false); setError('');
  };

  return (
    <div style={{position:'relative', flex:1, minWidth:0}}>
      <div onClick={()=>setOpen(o=>!o)} style={{height:32,padding:'0 10px',border:`1px solid ${open?'#0746CA':'#CBD5E1'}`,borderRadius:6,background:'#FFFFFF',display:'flex',alignItems:'center',gap:6,cursor:'pointer',transition:'border 0.15s'}}>
        <Icon name="Calendar" size={14} color={open?'#0746CA':'#64748B'}/>
        <span style={{fontSize:12,color:'#293548',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
          {fmtDisp(applied.from)} ~ {fmtDisp(applied.to)}
        </span>
      </div>
      {open && (
        <div style={{position:'absolute',top:36,left:0,zIndex:200,background:'#FFFFFF',border:'1px solid #E2E8F0',borderRadius:12,boxShadow:'0 8px 24px rgba(15,23,42,0.12)',padding:16,minWidth:300}}>
          <div style={{display:'flex',gap:5,marginBottom:12,flexWrap:'wrap'}}>
            {[['오늘',0],['1주일',7],['1개월',30],['3개월',90],['6개월',180],['1년',365]].map(([lbl,days])=>(
              <button key={lbl} onClick={()=>setPreset(days)} style={{all:'unset',cursor:'pointer',fontSize:11,fontWeight:500,padding:'3px 9px',borderRadius:4,border:'1px solid #E2E8F0',color:'#293548',background:'#F8FAFC',transition:'all 0.12s'}}>
                {lbl}
              </button>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <input type="date" value={from} max={to} onChange={e=>handleFrom(e.target.value)} style={{...cpt,flex:1}}/>
            <span style={{fontSize:12,color:'#94A3B8',flexShrink:0}}>~</span>
            <input type="date" value={to} min={from} max={toISO(new Date(new Date(from).getTime()+365*86400000))} onChange={e=>handleTo(e.target.value)} style={{...cpt,flex:1}}/>
          </div>
          {error && <div style={{fontSize:11,color:'#F91C1C',marginBottom:8}}>{error}</div>}
          <div style={{display:'flex',justifyContent:'flex-end',gap:6,marginTop:10}}>
            <Button type="line" usage="tertiary" size="xs" onClick={cancel}>취소</Button>
            <Button type="solid" usage="primary" size="xs" onClick={apply}>적용</Button>
          </div>
        </div>
      )}
    </div>
  );
};

const PaymentDetailModal = ({ row, onClose }) => {

  const [tab, setTab] = useState('detail');
  const hasRefund = row.refund_amount > 0;
  const B = `1px solid ${T.surfaceHeavy}`;

  const buyerMatch = (row.buyer_display||'').match(/^(.+?) \((.+)\)$/);
  const buyerName  = buyerMatch?.[1] || row.buyer_display || '—';
  const buyerEmail = buyerMatch?.[2] || '—';

  const mono = v => v ? <span style={{fontFamily:'ui-monospace,monospace',fontSize:12}}>{v}</span> : '—';

    <div style={{display:'grid',gridTemplateColumns:'130px 1fr 120px 1fr 90px 1fr',borderTop:first?'none':B}}>
      <div style={lc}>{l1}</div><div style={vc}>{v1??'—'}</div>
      <div style={lc}>{l2}</div><div style={vc}>{v2??'—'}</div>
      <div style={lc}>{l3}</div><div style={vce}>{v3??'—'}</div>

    <div style={{display:'grid',gridTemplateColumns:'130px 1fr'}}>

  const RH = ({title, first=false}) => (
    <div style={{borderTop:first?'none':B,background:'#EEF2F7',padding:'5px 14px',fontSize:11,fontWeight:600,color:T.fg3,letterSpacing:'0.08px',textTransform:'uppercase'}}>
      {title}

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(15,23,42,0.5)',animation:'sbFade 0.15s ease'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#FFFFFF',borderRadius:16,width:980,maxHeight:'90vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 24px 64px rgba(15,23,42,0.22)',animation:'sbPop 0.15s ease-out'}}>

        {/* Header */}

        {/* Tabs */}

            <button key={key} onClick={()=>setTab(key)} style={{
              all:'unset',cursor:'pointer',padding:'10px 16px',fontSize:14,

              display:'flex', alignItems:'center', gap:6,
            }}>
              {label}
              {key==='refund' && (row.refunds?.length || hasRefund) ? (

                  <span style={{fontSize:13,color:T.fg3,minWidth:64,flexShrink:0}}>결제 상태</span>
                  <Badge variant={STATUS_MAP[row.status]?.v||'neutral'}>{row.status}</Badge>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:13,color:T.fg3,minWidth:88,flexShrink:0}}>고객사 주문 ID</span>

                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:13,color:T.fg3,minWidth:88,flexShrink:0}}>세션 ID</span>

                row.payment_url

                  : '—'

              <R6       l1="생성 일시" v1={row.payment_date} l2="만료일시" v2={row.expires_at} l3="수정일시" v3={row.updated_at}/>

              <R4       l1="전체 수수료" v1={row.sentbiz_fee_amount ? <>{row.sentbiz_fee_amount?.toLocaleString('ko-KR')}<span style={{fontSize:11,color:T.fg4,marginLeft:3}}>{row.fee_currency}</span><span style={{fontSize:11,color:T.fg3,marginLeft:6}}>({row.sentbiz_fee_rate}%)</span></> : '—'} l2="영업 대행 수수료" v2={row.channel_fee_amount ? <>{row.channel_fee_amount?.toLocaleString('ko-KR')}<span style={{fontSize:11,color:T.fg4,marginLeft:3}}>{row.fee_currency}</span><span style={{fontSize:11,color:T.fg3,marginLeft:6}}>({row.channel_fee_rate}%)</span></> : '—'}/>
            </DT>

            <ST title="구매자 정보"/>

              <R6 first l1="구매자명" v1={buyerName} l2="구매자 이메일" v2={buyerEmail} l3="구매자 전화번호" v3={row.buyer_phone||'—'}/>
              <R2 l1="구매자 주소"   v1={row.buyer_address||'—'}/>
              <R2 l1="구매자 신분증" v1={
                <button style={{all:'unset',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,padding:'5px 12px',border:B,borderRadius:6,fontSize:12,color:T.fg2}}>

              refund_date:          row.refund_date,

              refund_status:        row.refund_status,
              refund_amount:        row.refund_amount,

              payment_id:           row.client_order_id?.replace('ORD','PMT'),

              { key:'환불 ID',         w:'1.3fr' },
              { key:'환불 일시',       w:'1.3fr' },

              { key:'환불 상태',       w:'0.7fr' },
              { key:'환불 금액',       w:'0.85fr', right:true },
              { key:'환불 사유',       w:'0.8fr' },
              { key:'완료 일시',       w:'1.2fr' },
              { key:'External 환불 ID',w:'1.2fr' },
              { key:'환불 월렛 주소',  w:'1.3fr' },
            ];
            const grid = RCOLS.map(c=>c.w).join(' ');

            return refunds.length > 0 ? (
              <div style={{marginTop:20}}>
                {/* 건수 */}
                <div style={{fontSize:13,color:T.fg3,marginBottom:10}}>총 <b style={{color:T.fg1}}>{refunds.length}</b>건</div>
                {/* 테이블 */}
                <div style={{border:B,borderRadius:8,overflow:'hidden'}}>
                  {/* 헤더 */}
                  <div style={{display:'grid',gridTemplateColumns:grid,background:T.surfaceNormal,borderBottom:B,padding:'0 16px',height:40,alignItems:'center',gap:10}}>

                      <div key={c.key} style={{fontSize:12,fontWeight:600,color:T.fg3,letterSpacing:'0.04px',textAlign:c.right?'right':'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.key}</div>

                  {refunds.map((r,i)=>(
                    <div key={i} style={{display:'grid',gridTemplateColumns:grid,alignItems:'center',padding:'0 16px',height:52,borderTop:i>0?B:'none',gap:10,transition:'background 0.1s'}}

                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <div style={{fontFamily:'ui-monospace,monospace',fontSize:12,color:T.fg2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.refund_id||'—'}</div>
                      <div style={{fontSize:12,color:T.fg2,whiteSpace:'nowrap'}}>{r.refund_date||'—'}</div>
                      <div><Badge variant='neutral'>{r.refund_type||'—'}</Badge></div>
                      <div><Badge variant={STATUS_MAP[r.refund_status]?.v||'neutral'}>{r.refund_status||'—'}</Badge></div>
                      <div style={{fontSize:13,fontWeight:600,color:T.negative,textAlign:'right',fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap'}}>

                      </div>
                      <div style={{fontFamily:'ui-monospace,monospace',fontSize:12,color:T.fg3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.payment_id||'—'}</div>
                      <div style={{fontFamily:'ui-monospace,monospace',fontSize:12,color:T.fg3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.refund_callback_data||'—'}</div>

  const grid = cols.map(c=>c.w).join(' ');
  return (
    <div style={{background:T.bg,border:`1px solid ${T.surfaceHeavy}`,borderRadius:12,overflow:'hidden',margin:'0 32px 32px'}}>

// ─── 결제 내역 Page ────────────────────────────────────────────────────────────
const PaymentRefundPage = () => {
  const [selectedRow, setSelectedRow] = useState(null);
  const rows       = DETAIL_ROWS.filter(r => r.transaction_type === 'PAYMENT');
  const successCnt = rows.filter(r=>r.status==='수취완료').length;
  const failCnt    = rows.filter(r=>r.status==='실패').length;
  const pendingCnt = rows.filter(r=>r.status==='대기').length;
  const totalKRW   = rows.filter(r=>r.request_currency==='KRW'&&r.request_amount>0).reduce((s,r)=>s+r.request_amount,0);
  const totalUSD   = rows.filter(r=>r.partner_currency==='USD'&&r.partner_amount>0).reduce((s,r)=>s+r.partner_amount,0);

  return (
    <>
    {selectedRow && <PaymentDetailModal row={selectedRow} onClose={()=>setSelectedRow(null)}/>}
    <div style={{flex:1,overflow:'auto',background:T.surfaceNormal}}>
      {/* Page header */}
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',padding:'28px 32px 20px'}}>
        <div>
          <div style={{fontSize:13,color:T.fg4,marginBottom:4}}>Request to Payment</div>
          <h1 style={{margin:0,fontSize:26,fontWeight:700,color:T.fg1,letterSpacing:'-0.005em'}}>결제 내역</h1>
        </div>
        <Button type="solid" usage="secondary" size="sm">
          <Icon name="DownloadSimple" size={14} color={T.primaryHeavy}/>
          CSV 다운로드
        </Button>
      </div>

      {/* Summary */}
      <div style={{margin:'0 32px 6px',display:'flex',alignItems:'center',gap:4}}>
        <Icon name="Info" size={13} color={T.fg4}/>
        <span style={{fontSize:11,color:T.fg4}}>요약 카드는 조회 기준일 하루(KST 00:00 ~ 23:59) 기준으로 집계됩니다.</span>
      </div>
      <HorizontalSummaryCard items={[
        { label:'전체 건수',    value:`${rows.length}건` },
        { label:'수취완료',     value:`${successCnt}건`, accent:T.positive },
        { label:'대기',         value:`${pendingCnt}건`, accent:T.warning  },
        { label:'실패',         value:`${failCnt}건`,    accent:T.negative },
        { label:'총 결제 금액', raw:true, value:
            <div style={{display:'flex',flexDirection:'column',gap:2}}>
              <div style={{fontSize:18,fontWeight:700,color:T.fg1,fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap'}}>
                {fmt(totalKRW)}<span style={{fontSize:12,fontWeight:400,color:T.fg4,marginLeft:4}}>KRW</span>
              </div>
              <div style={{fontSize:14,fontWeight:600,color:T.fg3,fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap'}}>
                {fmt(totalUSD)}<span style={{fontSize:11,fontWeight:400,color:T.fg4,marginLeft:4}}>USD</span>
              </div>
            </div>
        },
      ]}/>

      {/* Search filter */}
      <PaymentSearchFilter/>

      {/* Data table */}
      <DataTable rows={rows} colKeys={PAYMENT_COL_KEYS} colDefs={PAYMENT_COL_DEFS} onRowClick={setSelectedRow}/>
    </div>
    </>
  );
};
