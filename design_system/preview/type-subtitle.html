<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  body { font-family: var(--font-sans); color: var(--fg-1); -webkit-font-smoothing:antialiased; }
  .card { padding: 20px 24px; }
  .row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .swatch { width:64px; height:64px; border-radius:8px; display:flex; align-items:flex-end; padding:8px; color:#fff; font: 600 10px/1.1 var(--font-sans); box-shadow: inset 0 0 0 1px rgba(15,23,42,0.06); }
  .swatch-sm { width:44px; height:44px; border-radius:6px; box-shadow: inset 0 0 0 1px rgba(15,23,42,0.06); }
  .swatch.-lt { color: var(--fg-1); }
  .hex { font: 500 11px/1 ui-monospace,monospace; color: var(--fg-3); letter-spacing: 0.02em; margin-top:4px; }
  .lbl { font: 600 12px/1.2 var(--font-sans); color: var(--fg-2); }
  .tiny { font: 400 11px/1.3 var(--font-sans); color: var(--fg-3); letter-spacing: 0.3px; }
  .grid { display:grid; gap:12px; }
  .specimen { font-family: var(--font-sans); color: var(--fg-1); }
  .mono { font-family: ui-monospace, monospace; }
</style></head>
<body><div class="card">
<div class="col" style="gap:6px">
  <div class="tiny">Subtitle — section labels · Pretendard 600</div>
  <div class="specimen" style="font-weight:600;font-size:20px;line-height:30px">Recent activity</div>
  <div class="hex">Subtitle 1 · 20 / 30 · 600</div>
  <div class="specimen" style="font-weight:600;font-size:18px;line-height:28px">Account details</div>
  <div class="hex">Subtitle 2 · 18 / 28 · 600</div>
  <div class="specimen" style="font-weight:600;font-size:16px;line-height:24px">Counterparty</div>
  <div class="hex">Subtitle 3 · 16 / 24 · 600</div>
  <div class="specimen" style="font-weight:600;font-size:14px;line-height:20px">Reference ID</div>
  <div class="hex">Subtitle 4 · 14 / 20 · 600</div>
</div></div></body></html>
