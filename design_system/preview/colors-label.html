<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{font-family:var(--font-sans);color:var(--fg-1);-webkit-font-smoothing:antialiased;}
  .card{padding:20px 24px;}
  .row{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;gap:4px;}
  .tiny{font:400 11px/1.3 var(--font-sans);color:var(--fg-3);letter-spacing:0.3px;margin-bottom:6px;}
  .swatch{width:64px;height:64px;border-radius:8px;display:flex;align-items:flex-end;padding:8px;color:#fff;font:600 10px/1.1 var(--font-sans);box-shadow:inset 0 0 0 1px rgba(15,23,42,0.06);}
  .swatch.-lt{color:var(--fg-1);}
  .lbl{font:600 11px/1.2 var(--font-sans);color:var(--fg-2);}
  .hex{font:500 10px/1 var(--font-mono);color:var(--fg-3);}
  .var{font:400 9px/1.2 var(--font-mono);color:var(--fg-4);}
</style></head>
<body><div class="card">
<div class="tiny">Label — foreground text roles</div>
<div class="row">
  <div class="col">
    <div class="swatch" style="background:#000000"><span>Strong</span></div>
    <div class="lbl">Strong</div>
    <div class="hex">#000000</div>
    <div class="var">--s-label-strong</div>
  </div>
  <div class="col">
    <div class="swatch" style="background:#0F172A"><span>Default</span></div>
    <div class="lbl">Default</div>
    <div class="hex">#0F172A</div>
    <div class="var">--s-label-default</div>
  </div>
  <div class="col">
    <div class="swatch" style="background:#293548"><span>Normal</span></div>
    <div class="lbl">Normal</div>
    <div class="hex">#293548</div>
    <div class="var">--s-label-normal</div>
  </div>
  <div class="col">
    <div class="swatch" style="background:#64748B"><span>Natural</span></div>
    <div class="lbl">Natural</div>
    <div class="hex">#64748B</div>
    <div class="var">--s-label-natural</div>
  </div>
  <div class="col">
    <div class="swatch -lt" style="background:#94A3B8"><span>Soft</span></div>
    <div class="lbl">Soft</div>
    <div class="hex">#94A3B8</div>
    <div class="var">--s-label-soft</div>
  </div>
  <div class="col">
    <div class="swatch -lt" style="background:#CBD5E1"><span>Disable</span></div>
    <div class="lbl">Disable</div>
    <div class="hex">#CBD5E1</div>
    <div class="var">--s-label-disable</div>
  </div>
</div>
</div></body></html>
