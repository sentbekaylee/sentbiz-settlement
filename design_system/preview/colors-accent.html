<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{font-family:var(--font-sans);color:var(--fg-1);-webkit-font-smoothing:antialiased;}
  .card{padding:20px 24px;}
  .row{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;gap:4px;}
  .tiny{font:400 11px/1.3 var(--font-sans);color:var(--fg-3);letter-spacing:0.3px;margin-bottom:6px;}
  .swatch{width:64px;height:64px;border-radius:8px;display:flex;align-items:flex-end;padding:8px;color:#fff;font:600 10px/1.1 var(--font-sans);box-shadow:inset 0 0 0 1px rgba(15,23,42,0.06);}
  .swatch.-lt{color:var(--fg-1);}
  .lbl{font:600 11px/1.2 var(--font-sans);color:var(--fg-2);}
  .hex{font:500 10px/1 var(--font-mono);color:var(--fg-3);}
  .var{font:400 9px/1.2 var(--font-mono);color:var(--fg-4);}
</style></head>
<body><div class="card">
<div class="tiny">Accent — illustration + charts only. Never for interactive chrome.</div>
<div class="row">
  <div class="col">
    <div class="swatch" style="background:#915FFF"><span>Purple</span></div>
    <div class="lbl">Purple</div>
    <div class="hex">#915FFF</div>
    <div class="var">--sb-accent-purple</div>
  </div>
  <div class="col">
    <div class="swatch -lt" style="background:#5AEDA4"><span>Green</span></div>
    <div class="lbl">Green</div>
    <div class="hex">#5AEDA4</div>
    <div class="var">--sb-accent-green</div>
  </div>
  <div class="col">
    <div class="swatch -lt" style="background:#28E1E5"><span>Turquoise</span></div>
    <div class="lbl">Turquoise</div>
    <div class="hex">#28E1E5</div>
    <div class="var">--sb-accent-turquoise</div>
  </div>
  <div class="col">
    <div class="swatch" style="background:#40A9FF"><span>LightBlue</span></div>
    <div class="lbl">Light Blue</div>
    <div class="hex">#40A9FF</div>
    <div class="var">--sb-accent-lightblue</div>
  </div>
  <div class="col">
    <div class="swatch -lt" style="background:#FFD452"><span>Yellow</span></div>
    <div class="lbl">Yellow</div>
    <div class="hex">#FFD452</div>
    <div class="var">--sb-accent-yellow</div>
  </div>
</div>
</div></body></html>
