<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  body { font-family: var(--font-sans); color: var(--fg-1); -webkit-font-smoothing:antialiased; }
  .card { padding: 20px 24px; }
  .col { display:flex; flex-direction:column; gap:6px; align-items:center; }
  .hex { font: 500 10px/1 var(--font-mono); color: var(--fg-3); letter-spacing: 0.02em; text-align:center; }
  .tiny { font: 400 11px/1.3 var(--font-sans); color: var(--fg-3); letter-spacing: 0.3px; margin-bottom:4px; }
</style></head>
<body><div class="card">
<div class="tiny">Shadow scale — slate-tinted · 100/150 card · 200/250 panel · 300/350 dropdown · 400/450 modal</div>
<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#F8FAFC;padding:20px;border-radius:10px">

  <div class="col">
    <div style="width:56px;height:56px;background:#fff;border-radius:10px;box-shadow:0 2px 8px 0 rgba(15,23,42,0.08)"></div>
    <div class="hex">100</div>
  </div>

  <div class="col">
    <div style="width:56px;height:56px;background:#fff;border-radius:10px;box-shadow:0 2px 8px 0 rgba(15,23,42,0.16)"></div>
    <div class="hex">150</div>
  </div>

  <div class="col">
    <div style="width:56px;height:56px;background:#fff;border-radius:10px;box-shadow:0 2px 16px 0 rgba(15,23,42,0.10)"></div>
    <div class="hex">200</div>
  </div>

  <div class="col">
    <div style="width:56px;height:56px;background:#fff;border-radius:10px;box-shadow:0 2px 16px 0 rgba(15,23,42,0.20)"></div>
    <div class="hex">250</div>
  </div>

  <div class="col">
    <div style="width:56px;height:56px;background:#fff;border-radius:10px;box-shadow:0 0 1px 0 rgba(15,23,42,0.08),0 4px 20px 2px rgba(15,23,42,0.12)"></div>
    <div class="hex">300</div>
  </div>

  <div class="col">
    <div style="width:56px;height:56px;background:#fff;border-radius:10px;box-shadow:0 0 1px 0 rgba(15,23,42,0.08),0 4px 20px 2px rgba(15,23,42,0.24)"></div>
    <div class="hex">350</div>
  </div>

  <div class="col">
    <div style="width:56px;height:56px;background:#fff;border-radius:10px;box-shadow:0 0 1px 0 rgba(15,23,42,0.08),0 6px 24px 6px rgba(15,23,42,0.16)"></div>
    <div class="hex">400</div>
  </div>

  <div class="col">
    <div style="width:56px;height:56px;background:#fff;border-radius:10px;box-shadow:0 0 1px 0 rgba(15,23,42,0.08),0 6px 24px 6px rgba(15,23,42,0.40)"></div>
    <div class="hex">450</div>
  </div>

</div>
</div></body></html>
