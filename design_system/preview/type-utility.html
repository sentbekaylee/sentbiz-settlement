<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  body { font-family: var(--font-sans); color: var(--fg-1); -webkit-font-smoothing:antialiased; }
  .card { padding: 20px 24px; display:flex; flex-direction:column; gap:16px; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .hex { font: 500 11px/1 var(--font-mono); color: var(--fg-3); letter-spacing: 0.02em; margin-top:2px; }
  .tiny { font: 400 11px/1.3 var(--font-sans); color: var(--fg-3); letter-spacing: 0.3px; }
  .hr { height:1px; background:#F1F5F9; }
</style></head>
<body><div class="card">

  <!-- Button -->
  <div class="col">
    <div class="tiny">Button — 600 · 1.25px tracking</div>
    <div style="font-family:var(--font-sans);font-size:14px;line-height:16px;font-weight:600;letter-spacing:1.25px;color:var(--fg-1)">Save changes</div>
    <div class="hex">Button 1 · 14 / 16 · 600 · 1.25px</div>
    <div style="font-family:var(--font-sans);font-size:12px;line-height:14px;font-weight:600;letter-spacing:1.25px;color:var(--fg-1)">Edit</div>
    <div class="hex">Button 2 · 12 / 14 · 600 · 1.25px</div>
    <div style="font-family:var(--font-sans);font-size:11px;line-height:14px;font-weight:600;letter-spacing:1.25px;color:var(--fg-1)">Clear</div>
    <div class="hex">Button 3 · 11 / 14 · 600 · 1.25px</div>
  </div>

  <div class="hr"></div>

  <!-- Caption -->
  <div class="col">
    <div class="tiny">Caption — 400 · 0.5px tracking · fg3</div>
    <div style="font-family:var(--font-sans);font-size:11px;line-height:16px;font-weight:400;letter-spacing:0.5px;color:#64748B">CAPTION · UPDATED 2 HOURS AGO</div>
    <div class="hex">Caption · 11 / 16 · 400 · 0.5px · fg3</div>
  </div>

</div></body></html>
