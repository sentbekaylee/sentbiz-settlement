<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>SentBiz Dashboard — UI kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#F8FAFC; color:#0F172A; font-family:'Pretendard', system-ui, sans-serif; height:100%; }
  *, *::before, *::after { box-sizing:border-box; }
  button { font-family:inherit; }
  @keyframes sbFade    { from { opacity:0 } to { opacity:1 } }
  @keyframes sbSlideIn { from { transform:translateX(20px); opacity:0 } to { transform:translateX(0); opacity:1 } }
  @keyframes sbPop     { from { transform:translate(-50%,-50%) scale(0.96); opacity:0 } to { transform:translate(-50%,-50%) scale(1); opacity:1 } }
  #root { height:100vh; display:flex; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:999px; border:2px solid #F8FAFC; }
  ::-webkit-scrollbar-track { background:transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- ── Primitives ──────────────────────────────────────────────────────────── -->
<script type="text/babel">
const T = {
  primary:'#0746CA', primaryStrong:'#0C3698', primaryHeavy:'#122666',
  fg1:'#0F172A', fg2:'#293548', fg3:'#64748B', fg4:'#94A3B8', fgDisable:'#CBD5E1',
  bg:'#FFFFFF', surfaceNormal:'#F8FAFC', surfaceStrong:'#EAEFF5', surfaceHeavy:'#E2E8F0',
  positive:'#00C592', positiveLight:'#DFFBED',
  warning:'#FF6200',  warningLight:'#FFEFD3',
  negative:'#F91C1C', negativeLight:'#FFEFEF',
  progress:'#1890FF', progressLight:'#E6F7FF',
  informative:'#3176FD', informativeLight:'#F2F6FF',
  neutralFg:'#293548', neutralBg:'#F1F5F9', neutralBr:'#CBD5E1',
  borderSubtle:'rgba(112,115,124,0.22)', borderDefault:'#CBD5E1',
};

// Button — type: 'solid'|'line'|'text'  /  usage: 'primary'|'secondary'|'tertiary'
const Button = ({ type='solid', usage='primary', size='md', children, onClick, disabled, style, ...rest }) => {
  const base = {
    all:'unset', boxSizing:'border-box', display:'inline-flex',
    alignItems:'center', justifyContent:'center', gap:6,
    borderRadius:6, cursor:disabled?'not-allowed':'pointer',
    transition:'background 150ms cubic-bezier(0.2,0,0,1)',
    fontFamily:'Pretendard, -apple-system, sans-serif', fontWeight:600, whiteSpace:'nowrap',
  };
  const sizes = {
    lg:{ minHeight:48, padding:'16px',      fontSize:14, lineHeight:'16px', letterSpacing:'0.175px' },
    md:{ minHeight:40, padding:'12px 16px', fontSize:14, lineHeight:'16px', letterSpacing:'0.175px' },
    sm:{ minHeight:36, padding:'8px 14px',  fontSize:12, lineHeight:'14px', letterSpacing:'0.15px' },
    xs:{ minHeight:28, padding:'6px 12px',  fontSize:11, lineHeight:'14px', letterSpacing:'0.138px' },
  };
  const D = '#122666'; // Semantic/Primary/Heavy — Figma V.2 confirmed
  const matrix = {
    'solid-primary':   disabled?{background:T.surfaceStrong,color:T.fgDisable}:{background:D,color:'#FFFFFF'},
    'solid-secondary': disabled?{background:T.surfaceHeavy,color:T.fgDisable}:{background:T.surfaceStrong,color:D},
    'line-tertiary':   disabled?{background:T.bg,color:T.fgDisable,boxShadow:`inset 0 0 0 1px ${T.surfaceStrong}`}:{background:T.bg,color:D,boxShadow:`inset 0 0 0 1px ${T.surfaceStrong}`},
    'text-primary':    disabled?{background:'transparent',color:T.fgDisable,padding:'12px'}:{background:'transparent',color:D,padding:'12px'},
  };
  const vs = matrix[`${type}-${usage}`] || matrix['solid-primary'];
  return <button {...rest} disabled={disabled} onClick={onClick} style={{...base,...sizes[size],...vs,...style}}>{children}</button>;
};

const Badge = ({ variant='neutral', children }) => {
  const map = {
    positive:{c:T.positive,bg:T.positiveLight}, negative:{c:T.negative,bg:T.negativeLight},
    waiting:{c:T.warning,bg:T.warningLight},    informative:{c:T.informative,bg:T.informativeLight},
    neutral:{c:T.neutralFg,bg:T.neutralBg},     progress:{c:T.progress,bg:T.progressLight},
  };
  const s = map[variant];
  return <span style={{display:'inline-flex',alignItems:'center',height:22,padding:'0 10px',borderRadius:999,color:s.c,background:s.bg,fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:12,fontWeight:600,lineHeight:'18px',letterSpacing:'0.06px',whiteSpace:'nowrap'}}>{children}</span>;
};

const Icon = ({ name, size=20, color=T.fg2 }) => (
  <span style={{display:'inline-block',width:size,height:size,WebkitMask:`url(../../assets/icons/${name}.svg) center/contain no-repeat`,mask:`url(../../assets/icons/${name}.svg) center/contain no-repeat`,background:color,flexShrink:0}}/>
);

const IconBtn = ({ name, onClick, active, ariaLabel }) => (
  <button aria-label={ariaLabel} onClick={onClick} style={{all:'unset',boxSizing:'border-box',display:'inline-flex',alignItems:'center',justifyContent:'center',width:36,height:36,borderRadius:8,background:active?T.surfaceStrong:'transparent',cursor:'pointer',transition:'background 120ms cubic-bezier(0.2,0,0,1)'}}
    onMouseEnter={e=>{ if(!active) e.currentTarget.style.background=T.surfaceNormal; }}
    onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='transparent'; }}>
    <Icon name={name} size={20} color={T.fg2}/>
  </button>
);

const Avatar = ({ name='SB', size=32, bg=T.primary }) => (
  <div style={{width:size,height:size,borderRadius:999,background:bg,display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontFamily:'Pretendard, -apple-system, sans-serif',fontWeight:700,fontSize:Math.round(size*0.38),letterSpacing:'0.02em',flexShrink:0}}>{name}</div>
);

// Input — V.2: h-40, r-6, enabled border #E2E8F0, focus #122666, no focus ring
const Input = ({ placeholder, value, onChange, iconLeft, iconRight, onClear, unit, label, helperText, width='100%', isError, disabled }) => {
  const [focus, setFocus] = React.useState(false);
  const border = disabled?T.borderDefault:isError?T.negative:focus?'#122666':T.borderSubtle;
  const bg = disabled?T.surfaceStrong:T.bg;
  const helperColor = disabled?T.fgDisable:isError?T.negative:T.fg3;
  const showClear = onClear && value && !disabled;
  const iconColor = disabled?T.fgDisable:T.fg4;
  return (
    <div style={{display:'inline-flex',flexDirection:'column',width,gap:6}}>
      {label && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:T.fg3,letterSpacing:'0.07px'}}>{label}</span>}
      <div style={{display:'flex',alignItems:'center',height:40,padding:'0 16px',border:`1px solid ${border}`,background:bg,borderRadius:6,transition:'border 120ms cubic-bezier(0.2,0,0,1)'}}>
        {iconLeft && <span style={{marginRight:8,display:'inline-flex',flexShrink:0}}><Icon name={iconLeft} size={16} color={iconColor}/></span>}
        <input value={value} onChange={onChange} placeholder={placeholder}
          onFocus={()=>{ if(!disabled) setFocus(true); }} onBlur={()=>setFocus(false)}
          disabled={disabled}
          style={{flex:1,border:0,outline:0,background:'transparent',fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:disabled?T.fgDisable:T.fg1,letterSpacing:'0.07px',minWidth:0,cursor:disabled?'not-allowed':'text'}}/>
        {unit && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,color:disabled?T.fgDisable:T.fg3,marginLeft:8,whiteSpace:'nowrap',flexShrink:0}}>{unit}</span>}
        {showClear && <button onClick={onClear} style={{all:'unset',display:'inline-flex',cursor:'pointer',marginLeft:4,flexShrink:0}}><Icon name="XCircle" size={16} color={T.fg4}/></button>}
        {iconRight && !showClear && <span style={{marginLeft:8,display:'inline-flex',flexShrink:0}}><Icon name={iconRight} size={16} color={iconColor}/></span>}
      </div>
      {helperText && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:11,lineHeight:'16px',letterSpacing:'0.055px',color:helperColor}}>{helperText}</span>}
    </div>
  );
};

const SelectOption = ({ label, isSelected, onSelect }) => {
  const [hovered, setHovered] = React.useState(false);
  return (
    <button onClick={onSelect} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{all:'unset',boxSizing:'border-box',display:'flex',alignItems:'center',gap:8,height:40,paddingLeft:16,paddingRight:8,background:hovered?T.informativeLight:T.bg,borderRadius:4,cursor:'pointer',width:'100%',transition:'background 100ms cubic-bezier(0.2,0,0,1)'}}>
      <span style={{flex:1,fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:T.fg1,letterSpacing:'0.07px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}}>{label}</span>
      {isSelected && <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:20,height:20,flexShrink:0}}><Icon name="Check" size={16} color={T.fg2}/></span>}
    </button>
  );
};

// Select — V.2: h-40, r-6, open border #122666, dropdown Shadow100
const Select = ({ value, onChange, options=[], placeholder='선택하세요', label, helperText, isError, disabled, searchable=true, width='100%' }) => {
  const [open, setOpen] = React.useState(false);
  const [search, setSearch] = React.useState('');
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setSearch(''); } };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);
  const selected = options.find(o => o.value === value);
  const filtered = searchable && search ? options.filter(o => o.label.toLowerCase().includes(search.toLowerCase())) : options;
  const fieldBorder = disabled?T.borderDefault:isError?T.negative:open?'#122666':T.borderSubtle;
  const helperColor = disabled?T.fgDisable:isError?T.negative:T.fg3;
  return (
    <div ref={ref} style={{display:'inline-flex',flexDirection:'column',width,gap:4,position:'relative'}}>
      {label && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:T.fg3,letterSpacing:'0.07px'}}>{label}</span>}
      <button disabled={disabled} onClick={()=>{ if(!disabled){setOpen(o=>!o);setSearch('');} }}
        style={{all:'unset',boxSizing:'border-box',display:'flex',alignItems:'center',height:40,paddingLeft:16,paddingRight:8,border:`1px solid ${fieldBorder}`,background:disabled?T.surfaceStrong:T.bg,borderRadius:6,cursor:disabled?'not-allowed':'pointer',transition:'border 120ms cubic-bezier(0.2,0,0,1)'}}>
        <span style={{flex:1,fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'20px',color:(!selected||disabled)?T.fgDisable:T.fg1,letterSpacing:'0.07px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}}>
          {selected ? selected.label : placeholder}
        </span>
        <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:20,height:20,flexShrink:0}}>
          <Icon name={open?'CaretUp':'CaretDown'} size={16} color={disabled?T.fgDisable:T.fg2}/>
        </span>
      </button>
      {open && (
        <div style={{position:'absolute',top:44,left:0,right:0,zIndex:100,background:T.bg,border:`1px solid ${T.borderSubtle}`,borderRadius:6,boxShadow:'0 2px 8px 0 rgba(15,23,42,0.08)',padding:8,display:'flex',flexDirection:'column',gap:8}}>
          {searchable && (
            <div style={{display:'flex',alignItems:'center',gap:8,height:40,padding:8,background:T.surfaceNormal,borderRadius:4,flexShrink:0}}>
              <Icon name="MagnifyingGlass" size={16} color={T.fg4}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색어를 입력하세요." autoFocus
                style={{flex:1,border:0,outline:0,background:'transparent',fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:12,lineHeight:'18px',color:T.fg1,letterSpacing:'0.06px',minWidth:0}}/>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column'}}>
            {filtered.map(o => <SelectOption key={o.value} label={o.label} isSelected={o.value===value} onSelect={()=>{ onChange&&onChange(o.value); setOpen(false); setSearch(''); }}/>)}
            {filtered.length===0 && <div style={{height:40,display:'flex',alignItems:'center',paddingLeft:16,fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,color:T.fg4}}>결과 없음</div>}
          </div>
        </div>
      )}
      {helperText && <span style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:11,lineHeight:'16px',letterSpacing:'0.055px',color:helperColor}}>{helperText}</span>}
    </div>
  );
};

const Modal = ({ open, onClose, onConfirm, title, body, confirmLabel='Confirm', cancelLabel='Cancel' }) => {
  if (!open) return null;
  return <>
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.35)',backdropFilter:'blur(4px)',zIndex:60,animation:'sbFade 150ms cubic-bezier(0.2,0,0,1)'}}/>
    <div role="dialog" aria-modal="true" style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:440,maxWidth:'calc(100vw - 32px)',background:T.bg,borderRadius:16,boxShadow:'0 0 1px 0 rgba(15,23,42,0.08), 0 6px 24px 6px rgba(15,23,42,0.16)',padding:24,zIndex:61,animation:'sbPop 180ms cubic-bezier(0.2,0,0,1)'}}>
      <div style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:20,fontWeight:700,color:T.fg1,letterSpacing:'-0.005em'}}>{title}</div>
      <div style={{fontFamily:'Pretendard, -apple-system, sans-serif',fontSize:14,lineHeight:'22px',color:T.fg3,marginTop:10}}>{body}</div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:24}}>
        <Button type="solid" usage="secondary" onClick={onClose}>{cancelLabel}</Button>
        <Button type="solid" usage="primary" onClick={onConfirm}>{confirmLabel}</Button>
      </div>
    </div>
  </>;
};

Object.assign(window, { T, Button, Badge, Icon, IconBtn, Avatar, Input, Select, Modal });
</script>

<!-- ── Sidebar ────────────────────────────────────────────────────────────── -->
<script type="text/babel">
const NAV_ITEMS = [
  { key:'dashboard',      icon:'SquaresFour',     label:'Dashboard' },
  { key:'transactions',   icon:'ArrowsLeftRight', label:'Transactions' },
  { key:'settlements',    icon:'ClipboardText',   label:'Settlements' },
  { key:'counterparties', icon:'List',            label:'Counterparties' },
  { key:'fx',             icon:'Coins',           label:'FX rates' },
];
const FOOTER_ITEMS = [
  { key:'settings', icon:'Gear',     label:'Settings' },
  { key:'help',     icon:'Question', label:'Help' },
];

const Sidebar = ({ active, onNavigate, folded, onToggleFold }) => {
  const W = folded ? 64 : 240;

  const Item = ({ icon, label, k }) => {
    const isActive = active === k;
    return (
      <button onClick={()=>onNavigate(k)}
        style={{
          all:'unset', boxSizing:'border-box',
          display:'flex', alignItems:'center', gap:12,
          height:40, padding:folded?'0':'0 12px', margin:'0 8px',
          justifyContent:folded?'center':'flex-start',
          borderRadius:8, cursor:'pointer',
          background:isActive?T.informativeLight:'transparent',
          color:isActive?T.primary:T.fg2,
          fontFamily:'Pretendard,sans-serif', fontWeight:isActive?600:500,
          fontSize:14, lineHeight:'20px', letterSpacing:'0.07px',
          transition:'background 0.15s',
        }}
        onMouseEnter={e=>{ if(!isActive) e.currentTarget.style.background=T.surfaceNormal; }}
        onMouseLeave={e=>{ if(!isActive) e.currentTarget.style.background='transparent'; }}>
        <Icon name={icon} size={20} color={isActive?T.primary:T.fg3}/>
        {!folded && <span>{label}</span>}
      </button>
    );
  };

  return (
    <aside style={{
      width:W, flexShrink:0, height:'100%',
      background:T.bg, borderRight:`1px solid ${T.borderSubtle}`,
      display:'flex', flexDirection:'column',
      transition:'width 0.2s ease-in-out', overflow:'hidden',
    }}>
      <div style={{
        height:64, flexShrink:0, display:'flex', alignItems:'center',
        padding:folded?0:'0 20px', justifyContent:folded?'center':'flex-start',
        borderBottom:`1px solid ${T.neutralBg}`,
      }}>
        {folded
          ? <img src="../../assets/logos/logo-mark-dark-navy.svg" width="28" height="28" alt="SentBiz"/>
          : <img src="../../assets/logos/wordmark-navy.svg" width="92" height="20" alt="sentbiz"/>
        }
      </div>
      <nav style={{padding:'12px 0', display:'flex', flexDirection:'column', gap:2, flex:1}}>
        {NAV_ITEMS.map(it => <Item key={it.key} icon={it.icon} label={it.label} k={it.key}/>)}
      </nav>
      <div style={{padding:'12px 0', display:'flex', flexDirection:'column', gap:2, borderTop:`1px solid ${T.neutralBg}`}}>
        {FOOTER_ITEMS.map(it => <Item key={it.key} icon={it.icon} label={it.label} k={it.key}/>)}
        <div style={{padding:folded?0:'8px 20px', display:'flex', justifyContent:folded?'center':'flex-end', marginTop:4}}>
          <button onClick={onToggleFold} aria-label="Toggle sidebar"
            style={{all:'unset', cursor:'pointer', width:28, height:28, display:'flex', alignItems:'center', justifyContent:'center'}}>
            <Icon name="SidebarSimple" size={20} color={T.fg4}/>
          </button>
        </div>
      </div>
    </aside>
  );
};
window.Sidebar = Sidebar;
</script>

<!-- ── TopBar ─────────────────────────────────────────────────────────────── -->
<script type="text/babel">
const TopBar = ({ screenLabel }) => {
  const [q, setQ] = React.useState('');
  return <header style={{height:64,flexShrink:0,background:'#fff',borderBottom:'1px solid #E2E8F0',display:'flex',alignItems:'center',padding:'0 24px',gap:16}}>
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <span style={{fontFamily:'Pretendard,sans-serif',fontSize:13,color:'#94A3B8',fontWeight:500}}>Workspace</span>
      <span style={{color:'#CBD5E1',fontSize:13,fontWeight:400,lineHeight:1}}>/</span>
      <span style={{fontFamily:'Pretendard,sans-serif',fontSize:13,color:'#293548',fontWeight:600}}>{screenLabel}</span>
    </div>
    <div style={{flex:1,display:'flex',justifyContent:'center'}}>
      <div style={{width:420,maxWidth:'100%'}}>
        <Input placeholder="Search transactions, counterparties…" iconLeft="MagnifyingGlass" value={q} onChange={e=>setQ(e.target.value)} width="100%"/>
      </div>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:4}}>
      <IconBtn name="Question" ariaLabel="Help"/>
      <div style={{position:'relative'}}>
        <IconBtn name="Bell" ariaLabel="Notifications"/>
        <span style={{position:'absolute',top:7,right:7,width:8,height:8,borderRadius:999,background:'#F91C1C',border:'2px solid #fff'}}/>
      </div>
      <div style={{width:1,height:24,background:'#E2E8F0',margin:'0 8px'}}/>
      <div style={{display:'flex',alignItems:'center',gap:10,paddingRight:4}}>
        <Avatar name="DL" size={32} bg="#0746CA"/>
        <div style={{display:'flex',flexDirection:'column',lineHeight:1.2}}>
          <span style={{fontFamily:'Pretendard,sans-serif',fontSize:13,fontWeight:600,color:'#0F172A'}}>Delphine Lee</span>
          <span style={{fontFamily:'Pretendard,sans-serif',fontSize:11,color:'#64748B',letterSpacing:'0.3px'}}>SENTBE · Admin</span>
        </div>
      </div>
    </div>
  </header>;
};
window.TopBar = TopBar;
</script>

<!-- ── PageHeader + Filters ───────────────────────────────────────────────── -->
<script type="text/babel">
const PageHeader = ({ title, subtitle, actions }) => (
  <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:16,padding:'28px 32px 16px'}}>
    <div>
      <h1 style={{margin:0,fontFamily:'Pretendard,sans-serif',fontSize:26,lineHeight:'40px',fontWeight:700,color:'#0F172A',letterSpacing:'-0.005em'}}>{title}</h1>
      {subtitle && <div style={{fontFamily:'Pretendard,sans-serif',fontSize:14,lineHeight:'20px',color:'#64748B',marginTop:2}}>{subtitle}</div>}
    </div>
    <div style={{display:'flex',gap:8}}>{actions}</div>
  </div>
);

const Filters = ({ value, onChange, options }) => (
  <div style={{display:'flex',alignItems:'center',gap:16,padding:'4px 32px 20px',flexWrap:'wrap'}}>
    <div style={{display:'flex',gap:6}}>
      {options.map(o => {
        const isActive = value === o.key;
        return <button key={o.key} onClick={()=>onChange(o.key)} style={{
          all:'unset',boxSizing:'border-box',display:'inline-flex',alignItems:'center',
          height:32,padding:'0 12px',borderRadius:6,cursor:'pointer',
          background:isActive?'#1462FC':'#fff',
          color:isActive?'#fff':'#293548',
          border:isActive?'1px solid #1462FC':'1px solid #E2E8F0',
          fontFamily:'Pretendard,sans-serif',fontWeight:isActive?600:500,fontSize:13,lineHeight:'16px',
          transition:'all 0.15s',
        }}>{o.label}{o.count!=null && <span style={{marginLeft:6,opacity:0.8}}>{o.count}</span>}</button>;
      })}
    </div>
    <div style={{flex:1}}/>
    <div style={{display:'inline-flex',alignItems:'center',gap:8,height:32,padding:'0 12px',border:'1px solid #E2E8F0',borderRadius:6,background:'#fff',color:'#293548',fontFamily:'Pretendard,sans-serif',fontSize:13,fontWeight:500}}>
      <Icon name="Calendar" size={16} color="#64748B"/>
      Mar 1 – Mar 31, 2026
      <Icon name="CaretDown" size={14} color="#94A3B8"/>
    </div>
    <Button type="solid" usage="secondary" size="sm"><Icon name="DownloadSimple" size={14} color="#293548"/>Export</Button>
  </div>
);

Object.assign(window, { PageHeader, Filters });
</script>

<!-- ── DataTable ──────────────────────────────────────────────────────────── -->
<script type="text/babel">
const DataTable = ({ rows, onRowClick }) => {
  const cols = [
    {key:'id',    label:'Ref',          width:130},
    {key:'date',  label:'Date',         width:120},
    {key:'party', label:'Counterparty', width:200},
    {key:'route', label:'Route',        width:110},

        <Input placeholder="값을 입력하세요" value="" onChange={()=>{}} isError helperText="필수 입력 항목입니다" width={280}/>
      </Row>
      <Row label="disabled" align="flex-start">
        <Input placeholder="비활성 상태" value="" onChange={()=>{}} disabled helperText="수정 불가" width={280}/>
      </Row>
    </Sec>

    <Sec title="Select — states">
      <Row label="enabled (searchable)" align="flex-start">
        <Select value={sel1} onChange={setSel1} options={OPTS} placeholder="국가 선택" width={280}/>
      </Row>
      <Row label="filled + label + helper" align="flex-start">
        <Select value={sel2} onChange={setSel2} options={OPTS} label="수취국가" helperText="송금 가능한 국가를 선택하세요" width={280}/>
      </Row>
      <Row label="no search" align="flex-start">
        <Select value="" onChange={()=>{}} options={OPTS} placeholder="국가 선택" searchable={false} width={280}/>
      </Row>
      <Row label="error" align="flex-start">
        <Select value="" onChange={()=>{}} options={OPTS} placeholder="국가 선택" isError helperText="필수 항목입니다" width={280}/>
      </Row>
      <Row label="disabled" align="flex-start">
        <Select value="" onChange={()=>{}} options={OPTS} placeholder="국가 선택" disabled width={280}/>
      </Row>
    </Sec>

    <Sec title={`Icon — Phosphor PascalCase (${ALL_ICONS.length}개 로컬 SVG)`}>
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {ALL_ICONS.map(n => (
          <div key={n} title={n} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'12px 8px',background:'#fff',borderRadius:8,border:'1px solid #E2E8F0',width:84}}>
            <Icon name={n} size={20} color="#293548"/>
            <span style={{fontFamily:'ui-monospace,monospace',fontSize:9,color:'#94A3B8',textAlign:'center',lineHeight:'12px',wordBreak:'break-all'}}>{n}</span>
          </div>
        ))}
      </div>
    </Sec>
  </div>;
}

function EmptyScreen({ label }) {
  return <div style={{padding:'0 0 40px'}}>
    <PageHeader title={label} subtitle="This surface is out of scope for the UI kit."/>
    <div style={{margin:'0 32px',padding:'80px 24px',textAlign:'center',background:'#fff',border:'1px dashed #CBD5E1',borderRadius:12}}>
      <div style={{fontFamily:'Pretendard',fontSize:16,fontWeight:600,color:'#293548'}}>{label} — coming soon</div>
    </div>
  </div>;
}

function App() {
  const [active, setActive] = React.useState('dashboard');
  const [folded, setFolded] = React.useState(false);

  const Screen = {
    dashboard:      <DashboardScreen onJump={setActive}/>,
    transactions:   <TransactionsScreen/>,
    settlements:    <SettlementsScreen/>,
    counterparties: <EmptyScreen label="Counterparties"/>,
    fx:             <EmptyScreen label="FX rates"/>,
    components:     <ComponentsScreen/>,
    settings:       <EmptyScreen label="Settings"/>,
    help:           <EmptyScreen label="Help"/>,
  }[active];

  return <>
    <Sidebar active={active} onNavigate={setActive} folded={folded} onToggleFold={()=>setFolded(f=>!f)}/>
    <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
      <TopBar screenLabel={SCREEN_LABELS[active]}/>
      <main style={{flex:1,overflowY:'auto'}}>{Screen}</main>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
